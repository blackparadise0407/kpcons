<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      type="text/css"
      charset="UTF-8"
      href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.6.0/slick.min.css"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.6.0/slick-theme.min.css"
    />

    <title>KPCONS - KHÁNH PHÁT</title>
  </head>
  <body class="overflow-hidden font-sans">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener("DOMContentLoaded", () => {
        setTimeout(() => {
          let currentLang =
            window.localStorage.getItem("__kpcons_lang") || "vi";
          currentLang = ["vi", "eng", "cn"].includes(currentLang)
            ? currentLang
            : "vi";
          let html = "";
          Array.from({ length: 20 }).forEach((_, i) => {
            html += `<link rel="preload" href="/images/${currentLang}/KPC.BROCHURE-${currentLang}-${
              i + 1
            }.webp" as="image" type="image/webp" />`;
          });
          const temp = document.createElement("div");
          temp.innerHTML = html;
          Array.from(temp.children).forEach((el) => {
            document.head.appendChild(el);
          });
        }, 0);
      });
    </script>
  </body>
</html>
